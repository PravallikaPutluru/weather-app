<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .weather-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .weather-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .header {
            color: #333;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            margin-bottom: 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            transform: scale(1.02);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            display: none;
            font-size: 1.2em;
            color: #667eea;
            margin: 20px 0;
        }

        .error {
            display: none;
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .weather-info {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city-name {
            font-size: 2.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .weather-icon {
            font-size: 5em;
            margin: 20px 0;
            color: #667eea;
        }

        .temperature {
            font-size: 4em;
            font-weight: 300;
            color: #333;
            margin-bottom: 10px;
        }

        .description {
            font-size: 1.3em;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 25px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .detail-item {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-3px);
        }

        .detail-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.4em;
            font-weight: 600;
            color: #333;
        }

        .humidity-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .humidity-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        @media (max-width: 480px) {
            .weather-container {
                padding: 20px;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .temperature {
                font-size: 3em;
            }
            
            .weather-icon {
                font-size: 4em;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .current-location {
            background: rgba(70, 172, 141, 0.2);
            border: 2px solid rgba(70, 172, 141, 0.3);
            margin-top: 20px;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .current-location:hover {
            background: rgba(70, 172, 141, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
            <p>Weather Project</p>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="cityInput" placeholder="Enter city name (e.g., London, New York)">
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <button class="current-location" id="currentLocationBtn">
            <i class="fas fa-location-arrow"></i>
            <span>Use Current Location</span>
        </button>

        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i> Fetching weather...
        </div>

        <div class="error" id="error"></div>

        <div class="weather-info" id="weatherInfo">
            <div class="city-name" id="cityName"></div>
            <div class="weather-icon" id="weatherIcon"></div>
            <div class="temperature" id="temperature"></div>
            <div class="description" id="description"></div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                    <div class="humidity-bar">
                        <div class="humidity-fill" id="humidityFill"></div>
                    </div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Get your FREE API key from https://openweathermap.org/api
        const API_KEY = '483057be2c5c00e704f1130ccf768fb5'; // Replace with your OpenWeatherMap API key
        const API_URL = 'https://api.openweathermap.org/data/2.5/weather';

        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const currentLocationBtn = document.getElementById('currentLocationBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const weatherInfo = document.getElementById('weatherInfo');

        // Icon mapping for weather conditions
        const weatherIcons = {
            '01d': 'fas fa-sun', '01n': 'fas fa-moon',
            '02d': 'fas fa-cloud-sun', '02n': 'fas fa-cloud-moon',
            '03d': 'fas fa-cloud', '03n': 'fas fa-cloud',
            '04d': 'fas fa-clouds', '04n': 'fas fa-clouds',
            '09d': 'fas fa-cloud-rain', '09n': 'fas fa-cloud-rain',
            '10d': 'fas fa-cloud-sun-rain', '10n': 'fas fa-cloud-moon-rain',
            '11d': 'fas fa-bolt', '11n': 'fas fa-bolt',
            '13d': 'fas fa-snowflake', '13n': 'fas fa-snowflake',
            '50d': 'fas fa-smog', '50n': 'fas fa-smog'
        };

        // Search by city
        async function searchWeather(city) {
            showLoading();
            hideError();
            hideWeather();

            try {
                const response = await fetch(`${API_URL}?q=${city}&appid=${API_KEY}&units=metric`);
                
                if (!response.ok) {
                    throw new Error(response.status === 404 ? 'City not found' : 'Failed to fetch weather data');
                }

                const data = await response.json();
                displayWeather(data);
            } catch (err) {
                showError(err.message);
            }
        }

        // Get current location
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        showLoading();
                        hideError();
                        hideWeather();

                        try {
                            const response = await fetch(
                                `${API_URL}?lat=${latitude}&lon=${longitude}&appid=${API_KEY}&units=metric`
                            );
                            const data = await response.json();
                            displayWeather(data);
                        } catch (err) {
                            showError('Failed to get current location weather');
                        }
                    },
                    () => showError('Location access denied')
                );
            } else {
                showError('Geolocation not supported');
            }
        }

        // Display weather data
        function displayWeather(data) {
            hideLoading();
            document.getElementById('cityName').textContent = data.name + ', ' + data.sys.country;
            document.getElementById('temperature').textContent = Math.round(data.main.temp) + '°C';
            document.getElementById('description').textContent = data.weather[0].description;
            
            // Weather icon
            const iconCode = data.weather[0].icon;
            const icon = weatherIcons[iconCode] || 'fas fa-cloud';
            document.getElementById('weatherIcon').className = icon;
            
            // Details
            document.getElementById('feelsLike').textContent = Math.round(data.main.feels_like) + '°C';
            document.getElementById('humidity').textContent = data.main.humidity + '%';
            document.getElementById('windSpeed').textContent = data.wind.speed + ' m/s';
            document.getElementById('pressure').textContent = data.main.pressure + ' hPa';
            
            // Humidity bar
            document.getElementById('humidityFill').style.width = data.main.humidity + '%';
            
            showWeather();
        }

        // UI Helpers
        function showLoading() { loading.style.display = 'block'; }
        function hideLoading() { loading.style.display = 'none'; }
        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
            hideLoading();
        }
        function hideError() { error.style.display = 'none'; }
        function showWeather() { weatherInfo.style.display = 'block'; }
        function hideWeather() { weatherInfo.style.display = 'none'; }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) searchWeather(city);
            else showError('Please enter a city name');
        });

        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = cityInput.value.trim();
                if (city) searchWeather(city);
                else showError('Please enter a city name');
            }
        });

        currentLocationBtn.addEventListener('click', getCurrentLocation);

        // Default search for Delhi on load
        window.addEventListener('load', () => {
            searchWeather('Delhi');
        });
    </script>
</body>
</html>
